<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Airtime</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111827;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:90%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.summary{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Buy Airtime</h2>

<label>Paying Number</label>
<input type="text" id="paying" placeholder="07XXXXXXXX">

<label>Receiving Number</label>
<input type="text" id="receiving" placeholder="07XXXXXXXX">

<label>Amount Paid (KES)</label>
<input type="number" id="amount" placeholder="Enter amount" oninput="calculate()">

<label>To Receive</label>
<input type="text" id="receive" readonly>

<button onclick="confirmOrder()">Confirm Order</button>

<div class="summary" id="summary"></div>

</div>

<script>

const RATE = 0.90;

function calculate(){

let amount = document.getElementById("amount").value;

if(amount <= 0){
document.getElementById("receive").value = "";
return;
}

let airtime = amount / RATE;
airtime = Math.round(airtime);

document.getElementById("receive").value = airtime;

}

function confirmOrder(){

let paying = document.getElementById("paying").value;
let receiving = document.getElementById("receiving").value;
let amount = document.getElementById("amount").value;
let receive = document.getElementById("receive").value;

document.getElementById("summary").innerHTML =
"<b>Order Summary</b><br><br>" +
"Paying Number: " + paying + "<br>" +
"Receiving Number: " + receiving + "<br>" +
"Amount Paid: " + amount + "<br>" +
"Airtime To Send: " + receive;

}

</script>

</body>
</html>
