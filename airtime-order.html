<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Airtime</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#111827;
padding:30px;
border-radius:15px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:90%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-size:16px;
}

.payment{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
}

.warning{
color:#facc15;
font-size:14px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

.copy-btn{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h2>Buy Airtime</h2>

<label>Till Name</label>
<input type="text" id="tillname" placeholder="Enter till name">

<label>Receiving Number</label>
<input type="text" id="number" placeholder="07XXXXXXXX">

<label>Amount Paid</label>
<input type="number" id="amount" oninput="calculate()">

<label>To Receive</label>
<input type="text" id="receive" readonly>

<div class="payment">

<h3>M-Pesa Payment (Till to Till)</h3>

<p><b>Till Number:</b> <span id="till">8396206</span></p>

<button class="copy-btn" onclick="copyTill()">Copy Till Number</button>

<p class="warning">
⚠️ Only confirm order after completing M-Pesa payment.
</p>

</div>

<button onclick="confirmOrder()">Confirm Order</button>

</div>

<script>

const supabase = window.supabase.createClient(
"https://ihedsiltqrxbqwnouone.supabase.co",
"sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"
)

let currentRate = 90
let currentStock = 0
let stockStatus = true

async function loadSettings(){

const { data } = await supabase
.from("settings")
.select("*")
.eq("id",1)
.single()

currentRate = data.rate
currentStock = data.stock
stockStatus = data.stock_status

}

loadSettings()

function calculate(){

let rate = currentRate / 100

let amount = document.getElementById("amount").value

if(amount <= 0){

document.getElementById("receive").value=""

return

}

let airtime = amount / rate

airtime = Math.round(airtime)

document.getElementById("receive").value = airtime

}

function copyTill(){

let till = document.getElementById("till").innerText

navigator.clipboard.writeText(till)

alert("Till number copied: " + till)

}

async function confirmOrder(){

if(!stockStatus){

alert("Airtime currently out of stock")

return

}

let tillname = document.getElementById("tillname").value
let number = document.getElementById("number").value
let amount = document.getElementById("amount").value
let airtime = document.getElementById("receive").value

if(!tillname || !number || !amount){

alert("Please fill all fields")

return

}

if(currentStock < airtime){

alert("Not enough airtime stock")

return

}

await supabase.from("orders").insert({

till_name:tillname,
receiving_number:number,
amount_paid:amount,
airtime_sent:airtime

})

currentStock = currentStock - airtime

await supabase
.from("settings")
.update({ stock: currentStock })
.eq("id",1)

let message =
"NEW AIRTIME ORDER%0A%0A"+
"Till Name: "+tillname+"%0A"+
"Receiving Number: "+number+"%0A"+
"Amount Paid: "+amount+"%0A"+
"Airtime To Send: "+airtime

let phone="254746975939"

window.open("https://wa.me/"+phone+"?text="+message)

}

</script>

</body>
</html>
