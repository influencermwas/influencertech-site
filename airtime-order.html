<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Airtime</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111827;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:90%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-size:16px;
}

.result{
margin-top:15px;
font-size:20px;
color:#4ade80;
font-weight:bold;
}

.back{
display:block;
margin-top:20px;
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Buy Airtime</h2>

<label>Paying Number</label>
<input type="text" placeholder="07XXXXXXXX">

<label>Receiving Number</label>
<input type="text" placeholder="07XXXXXXXX">

<label>Amount Paid (KES)</label>
<input type="number" id="amount" placeholder="Enter amount" oninput="calculate()">

<label>To Receive</label>
<input type="text" id="receive" readonly>

<a class="back" href="index.html">← Back to Home</a>

</div>

<script>

/* CHANGE DAILY RATE HERE */
const RATE = 0.90;

function calculate(){

let amount = document.getElementById("amount").value;

if(amount <= 0){
document.getElementById("receive").value = "";
return;
}

let airtime = amount / RATE;

airtime = Math.round(airtime);

document.getElementById("receive").value = airtime + " Airtime";

}

</script>

</body>
</html>
