<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Airtime</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#111827;
padding:30px;
border-radius:15px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
margin-top:0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:90%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-size:16px;
}

.payment{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
}

.warning{
color:#facc15;
font-size:14px;
margin-top:10px;
}

button{
margin-top:20px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<h2>Buy Airtime</h2>

<label>Paying Number</label>
<input type="text" id="paying" placeholder="07XXXXXXXX">

<label>Receiving Number</label>
<input type="text" id="receiving" placeholder="07XXXXXXXX">

<label>Amount Paid (KES)</label>
<input type="number" id="amount" placeholder="Enter amount" oninput="calculate()">

<label>To Receive</label>
<input type="text" id="receive" readonly>

<div class="payment">

<h3>Pay with M-Pesa</h3>

<p><b>Till Number:</b> 8396206</p>

<p class="warning">
⚠️ Only confirm order after completing M-Pesa payment.
</p>

</div>

<button onclick="sendWhatsApp()">Confirm Order</button>

</div>

<script>

const RATE = 0.90;

function calculate(){

let amount = document.getElementById("amount").value;

if(amount <= 0){
document.getElementById("receive").value="";
return;
}

let airtime = amount / RATE;

airtime = Math.round(airtime);

document.getElementById("receive").value = airtime;

}

function sendWhatsApp(){

let paying = document.getElementById("paying").value;
let receiving = document.getElementById("receiving").value;
let amount = document.getElementById("amount").value;
let receive = document.getElementById("receive").value;

let message =
"NEW AIRTIME ORDER%0A%0A" +
"Paying Number: " + paying + "%0A" +
"Receiving Number: " + receiving + "%0A" +
"Amount Paid: " + amount + "%0A" +
"Airtime To Send: " + receive;

let phone = "254746975939";

window.open("https://wa.me/" + phone + "?text=" + message);

}

</script>

</body>
</html>
