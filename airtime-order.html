<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Airtime</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:#111827;
padding:30px;
border-radius:15px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:90%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-size:16px;
}

.payment{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:10px;
}

.warning{
color:#facc15;
font-size:14px;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

.copy-btn{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h2>Buy Airtime</h2>

<div id="stockMessage"></div>

<label>Till Name</label>
<input type="text" id="tillname" placeholder="Enter till name">

<label>Receiving Number</label>
<input type="text" id="number" placeholder="07XXXXXXXX">

<label>Amount Paid</label>
<input type="number" id="amount" oninput="calculate()">

<label>To Receive</label>
<input type="text" id="receive" readonly>

<div class="payment">

<h3>M-Pesa Payment (Till to Till)</h3>

<p><b>Till Number:</b> <span id="till">8396206</span></p>

<button class="copy-btn" onclick="copyTill()">Copy Till Number</button>

<p class="warning">
⚠️ Only confirm order after completing M-Pesa payment.
</p>

</div>

<button onclick="confirmOrder()">Confirm Order</button>

</div>

<script>

function calculate(){

let rate = localStorage.getItem("rate") || 0.90

let amount = document.getElementById("amount").value

if(amount <= 0){

document.getElementById("receive").value=""

return

}

let airtime = amount / rate

airtime = Math.round(airtime)

document.getElementById("receive").value = airtime

}

function copyTill(){

let till = document.getElementById("till").innerText

navigator.clipboard.writeText(till)

alert("Till number copied: " + till)

}

function confirmOrder(){

let stockStatus = localStorage.getItem("stockStatus")

if(stockStatus === "false"){

alert("Airtime currently out of stock")

return

}

let tillname = document.getElementById("tillname").value
let number = document.getElementById("number").value
let amount = document.getElementById("amount").value
let airtime = document.getElementById("receive").value

if(!tillname || !number || !amount){

alert("Please fill all fields")

return

}

let stock = parseInt(localStorage.getItem("stock") || 100000)

if(stock < airtime){

alert("Not enough airtime stock")

return

}

stock = stock - airtime

localStorage.setItem("stock",stock)

let sales = parseInt(localStorage.getItem("sales") || 0)

sales = sales + parseInt(amount)

localStorage.setItem("sales",sales)

let orders = JSON.parse(localStorage.getItem("orders") || "[]")

orders.push({
number:number,
airtime:airtime
})

localStorage.setItem("orders",JSON.stringify(orders))

let message =
"NEW AIRTIME ORDER%0A%0A"+
"Till Name: "+tillname+"%0A"+
"Receiving Number: "+number+"%0A"+
"Amount Paid: "+amount+"%0A"+
"Airtime To Send: "+airtime

let phone="254746975939"

window.open("https://wa.me/"+phone+"?text="+message)

}

let stockStatus = localStorage.getItem("stockStatus")

if(stockStatus === "false"){

document.getElementById("stockMessage").innerHTML =
"<h3 style='color:red'>⚠ Airtime Currently Out Of Stock</h3>"

}

</script>

</body>
</html>
