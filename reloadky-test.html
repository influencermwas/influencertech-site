<!DOCTYPE html>
<html>
<head>
<title>Reloadly API Test</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding-top:100px;
}

button{
padding:15px 25px;
background:#28a745;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
}
</style>
</head>

<body>

<h1>Reloadly API Testing Page</h1>

<button onclick="getToken()">Test Reloadly Connection</button>

<div id="result"></div>

<script>
async function getToken(){

document.getElementById("result").innerHTML="Connecting...";

const response = await fetch("https://auth.reloadly.com/oauth/token",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
client_id:"YOUR_CLIENT_ID",
client_secret:"YOUR_CLIENT_SECRET",
grant_type:"client_credentials",
audience:"https://topups.reloadly.com"
})
});

const data = await response.json();

document.getElementById("result").innerHTML=
"<pre>"+JSON.stringify(data,null,2)+"</pre>";

}
</script>

</body>
</html>
