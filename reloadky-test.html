<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloadly API Test</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f2027;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#111827;
padding:40px;
border-radius:15px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button{
background:#22c55e;
border:none;
padding:14px 20px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:8px;
font-size:14px;
text-align:left;
word-break:break-all;
}

.back{
display:inline-block;
margin-top:20px;
color:#38bdf8;
text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h2>Reloadly API Test</h2>
<p>Click the button to test Reloadly connection.</p>

<button onclick="testReloadly()">Test Connection</button>

<div id="result">Result will appear here...</div>

<a class="back" href="/">← Back to homepage</a>

</div>

<script>

async function testReloadly(){

const resultBox = document.getElementById("result");
resultBox.innerHTML = "Connecting to Reloadly...";

try{

const response = await fetch("https://auth.reloadly.com/oauth/token",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
client_id:"YOUR_CLIENT_ID",
client_secret:"YOUR_CLIENT_SECRET",
grant_type:"client_credentials",
audience:"https://topups.reloadly.com"
})
});

const data = await response.json();

resultBox.innerHTML = JSON.stringify(data,null,2);

}catch(error){

resultBox.innerHTML = "Error: " + error;

}

}

</script>

</body>
</html>
