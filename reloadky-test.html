<!DOCTYPE html>
<html>
<head>
<title>Reloadly API Test</title>

<style>
body{
font-family:Arial;
background:#111827;
color:white;
text-align:center;
padding-top:80px;
}

button{
padding:15px 25px;
background:#22c55e;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

#result{
margin-top:20px;
}
</style>

</head>

<body>

<h1>Reloadly API Test Page</h1>

<p>This page is for testing Reloadly connection.</p>

<button onclick="testAPI()">Test Reloadly Connection</button>

<div id="result"></div>

<script>

async function testAPI(){

document.getElementById("result").innerHTML="Connecting...";

const response = await fetch("https://auth.reloadly.com/oauth/token",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
client_id:"YOUR_CLIENT_ID",
client_secret:"YOUR_CLIENT_SECRET",
grant_type:"client_credentials",
audience:"https://topups.reloadly.com"
})
});

const data = await response.json();

document.getElementById("result").innerHTML =
"<pre>"+JSON.stringify(data,null,2)+"</pre>";

}

</script>

</body>
</html>
