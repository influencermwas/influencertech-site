<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
padding:40px;
}

.box{
background:#111827;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="login">

<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Enter password">

<br><br>

<button onclick="login()">Login</button>

</div>

<div id="panel" style="display:none">

<div class="box">

<h2>Admin Dashboard</h2>

Stock Status  
<br><br>

<button onclick="setStock(true)">ON</button>
<button onclick="setStock(false)">OFF</button>

<br><br>

Airtime Stock

<br>

<input type="number" id="stock">

<button onclick="updateStock()">Update</button>

<br><br>

Rate

<br>

<input type="number" step="0.01" id="rate">

<button onclick="updateRate()">Update</button>

<br><br>

<h3>Today's Sales</h3>

<div id="sales"></div>

<br>

<h3>Orders</h3>

<div id="orders"></div>

</div>

</div>

<script>

const ADMIN_PASSWORD = "Brian4503";

function login(){

let pass = document.getElementById("password").value;

if(pass === ADMIN_PASSWORD){

document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";

loadData();

}else{

alert("Wrong password");

}

}

function loadData(){

let stock = localStorage.getItem("stock") || 100000;
let rate = localStorage.getItem("rate") || 0.90;
let sales = localStorage.getItem("sales") || 0;
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

document.getElementById("stock").value = stock;
document.getElementById("rate").value = rate;
document.getElementById("sales").innerHTML = "KES " + sales;

let html="";

orders.forEach(o=>{
html += o.number + " → " + o.airtime + "<br>";
});

document.getElementById("orders").innerHTML = html;

}

function setStock(status){

localStorage.setItem("stockStatus",status);

alert("Stock status updated");

}

function updateStock(){

let stock = document.getElementById("stock").value;

localStorage.setItem("stock",stock);

alert("Stock updated");

}

function updateRate(){

let rate = document.getElementById("rate").value;

localStorage.setItem("rate",rate);

alert("Rate updated");

}

</script>

</body>
</html>
