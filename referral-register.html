<!DOCTYPE html>
<html>
<head>
<title>Referral Register</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h2>Join Influencertech Referral Program</h2>

<input id="phone" placeholder="Phone number"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="registerUser()">Register</button>
<button onclick="goToLogin()">Login</button>

<script>

const supabaseUrl = "https://ihedsiltqrxbqwnouone.supabase.co"
const supabaseKey = "sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"

const db = supabase.createClient(supabaseUrl, supabaseKey)

async function registerUser(){

let phone = document.getElementById("phone").value.trim()
let password = document.getElementById("password").value.trim()

if(!phone || !password){
alert("Enter phone and password")
return
}

// Check if user already exists
const { data:existing } = await db
.from("referral_users")
.select("phone")
.eq("phone", phone)

if(existing && existing.length > 0){
alert("User already exists. Please login.")
return
}

let code = "INF" + Math.floor(Math.random()*10000)

const { error } = await db
.from("referral_users")
.insert([{phone,password,referral_code:code,referrals:0,earnings:0}])

if(error){
alert(error.message)
return
}

alert("Account created successfully")

}

function goToLogin(){
window.location.href = "referral-login.html"
}

</script>

</body>
</html>
