<!DOCTYPE html>
<html>
<head>
<title>Influencertech Referral</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
margin:5px;
}

.register{background:#2563eb;}
.login{background:#16a34a;}
</style>
</head>

<body>

<div class="box">

<h2>Referral Program</h2>

<input id="phone" placeholder="Phone number">
<input id="password" type="password" placeholder="Password">

<br>

<button class="register" onclick="registerUser()">Register</button>
<button class="login" onclick="loginUser()">Login</button>

</div>

<script>

const supabaseUrl = "https://ihedsiltqrbqwnouone.supabase.co"
const supabaseKey = "YOUR_PUBLIC_ANON_KEY"

const db = supabase.createClient(supabaseUrl, supabaseKey)

async function registerUser(){

let phone=document.getElementById("phone").value
let password=document.getElementById("password").value

if(!phone || !password){
alert("Enter phone and password")
return
}

const { data:existing } = await db
.from("referral_users")
.select("phone")
.eq("phone", phone)

if(existing.length > 0){
alert("User already exists. Please login.")
return
}

let code="INF"+Math.floor(Math.random()*10000)

const { error } = await db
.from("referral_users")
.insert([{phone,password,referral_code:code,referrals:0,earnings:0}])

if(error){
alert(error.message)
return
}

alert("Account created successfully")

}

async function loginUser(){

let phone=document.getElementById("phone").value
let password=document.getElementById("password").value

const { data, error } = await db
.from("referral_users")
.select("*")
.eq("phone", phone)
.eq("password", password)
.single()

if(error){
alert("Wrong login details")
return
}

localStorage.setItem("user_phone", phone)

window.location.href="referral-dashboard.html"

}

</script>

</body>
</html>
