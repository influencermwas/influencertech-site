<!DOCTYPE html><html>
<head>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:12px;
width:320px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:10px;

.register{

}

}
</style></head><body><div class="container"><h2>Join Influencertech Referral Program</h2><input id="phone" placeholder="Phone Number">
<input id="password" type="password" placeholder="Password"><div class="buttons">
<button class="register" onclick="registerUser()">Register</button>
<button class="login" onclick="loginUser()">Login</button>
</div></div><script>

const supabaseUrl = "https://ihedsiltqrxbqwnouone.supabase.co"
const supabaseKey = "sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"

const { createClient } = supabase
const client = createClient(supabaseUrl, supabaseKey)

async function registerUser(){

let phone = document.getElementById("phone").value
let password = document.getElementById("password").value

if(!phone || !password){
alert("Enter phone and password")
return
}

let code = "INF" + Math.floor(Math.random()*10000)

const { error } = await client
.from("referral_users")
.insert([{
phone: phone,
password: password,
referral_code: code,
referrals: 0,
earnings: 0
}])

if(error){
alert(error.message)
return
}

alert("Account created successfully. Now click LOGIN.")

}

async function loginUser(){

let phone = document.getElementById("phone").value
let password = document.getElementById("password").value

const { data, error } = await client
.from("referral_users")
.select("*")
.eq("phone", phone)
.eq("password", password)
.single()

if(error){
alert("Invalid phone or password")
return
}

localStorage.setItem("user_phone", phone)

window.location.href = "referral-dashboard.html"

}

</script></body>
</html>
