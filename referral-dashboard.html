<!DOCTYPE html>
<html>
<head>
<title>Referral Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body style="font-family:Arial;text-align:center;margin-top:60px;">

<h2>Referral Dashboard</h2>

<div id="loading">Loading...</div>

<div id="dashboard" style="display:none;">

<p><strong>Phone:</strong> <span id="userPhone"></span></p>
<p><strong>Referral Code:</strong> <span id="refCode"></span></p>
<p><strong>Total Referrals:</strong> <span id="refCount"></span></p>
<p><strong>Earnings (KES):</strong> <span id="earnings"></span></p>

<p><strong>Your Referral Link:</strong></p>
<p id="refLink" style="word-break:break-all;"></p>

<br>
<button onclick="logout()">Logout</button>

</div>

<script>

const supabaseUrl = "https://ihedsiltqrxbqwnouone.supabase.co"
const supabaseKey = "sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"

const db = supabase.createClient(supabaseUrl, supabaseKey)

async function loadDashboard(){

let phone = localStorage.getItem("user_phone")

if(!phone){
window.location.href = "referral-login.html"
return
}

const { data, error } = await db
.from("referral_users")
.select("*")
.eq("phone", phone)
.single()

if(error){
alert("Error loading dashboard")
return
}

document.getElementById("userPhone").innerText = data.phone
document.getElementById("refCode").innerText = data.referral_code
document.getElementById("refCount").innerText = data.referrals
document.getElementById("earnings").innerText = data.earnings

let link = window.location.origin + "/referral-register.html?ref=" + data.referral_code
document.getElementById("refLink").innerText = link

document.getElementById("loading").style.display = "none"
document.getElementById("dashboard").style.display = "block"

}

function logout(){
localStorage.removeItem("user_phone")
window.location.href = "referral-login.html"
}

loadDashboard()

</script>

</body>
</html>
