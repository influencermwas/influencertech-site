<!DOCTYPE html>
<html>
<head>
<title>Referral Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body style="font-family:Arial;text-align:center;margin-top:60px;">

<h2>Referral Dashboard</h2>

<div id="content">Loading...</div>
<br>
<button onclick="logout()">Logout</button>

<script>

const supabaseUrl = "https://ihedsiltqrxbqwnouone.supabase.co"
const supabaseKey = "sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"
const db = supabase.createClient(supabaseUrl, supabaseKey)

async function loadDashboard(){

// GET PHONE FROM URL
const params = new URLSearchParams(window.location.search)
let phone = params.get("phone")

if(!phone){
window.location.href = "/referral-login"
return
}

const { data, error } = await db
.from("referral_users")
.select("*")
.eq("phone", phone)
.single()

if(error || !data){
window.location.href = "/referral-login"
return
}

document.getElementById("content").innerHTML = `
<p><strong>Phone:</strong> ${data.phone}</p>
<p><strong>Referral Code:</strong> ${data.referral_code}</p>
<p><strong>Total Referrals:</strong> ${data.referrals}</p>
<p><strong>Earnings:</strong> ${data.earnings}</p>
`

}

function logout(){
window.location.href = "/referral-login"
}

loadDashboard()

</script>

</body>
</html>
