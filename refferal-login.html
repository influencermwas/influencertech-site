<!DOCTYPE html>
<html>
<head>
<title>Referral Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

<body style="font-family:Arial;text-align:center;margin-top:100px;">

<h2>Referral Login</h2>

<input id="phone" placeholder="Phone number"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="loginUser()">Login</button>

<script>

const supabaseUrl = "https://ihedsiltqrxbqwnouone.supabase.co"
const supabaseKey = "sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"

const db = supabase.createClient(supabaseUrl, supabaseKey)

async function loginUser(){

let phone = document.getElementById("phone").value.trim()
let password = document.getElementById("password").value.trim()

if(!phone || !password){
alert("Enter phone and password")
return
}

const { data, error } = await db
.from("referral_users")
.select("*")
.eq("phone", phone)
.eq("password", password)
.single()

if(error || !data){
alert("Wrong login details")
return
}

// Save session
localStorage.setItem("user_phone", phone)

// Clean route redirect (NO .html)
window.location.href = "/referral-dashboard"

}

</script>

</body>
</html>
