<!DOCTYPE html>
<html>
<head>
<title>Referral Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial;text-align:center;margin-top:60px;">

<h2>Influencertech Referral Dashboard</h2>

<div id="info">Loading...</div>

<br>
<button onclick="logout()">Logout</button>

<script>

const supabaseUrl = "https://ihedsiltqrxbqwnouone.supabase.co"
const supabaseKey = "sb_publishable_2HLZ4B0X1atCHE_PBhXAmw_akGNlxlJ"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

async function loadUser(){

let phone = localStorage.getItem("referral_phone")

if(!phone){
alert("Please login first")
window.location.href="/referral-login/"
return
}

const { data, error } = await supabase
.from("referral_users")
.select("*")
.eq("phone", phone)
.single()

if(error || !data){
alert("Session expired. Please login again.")
localStorage.removeItem("referral_phone")
window.location.href="/referral-login/"
return
}

document.getElementById("info").innerHTML = 
<p><b>Phone:</b> ${data.phone}</p>
<p><b>Referral Code:</b> ${data.referral_code}</p>
<p><b>Referrals:</b> ${data.referrals}</p>
<p><b>Earnings:</b> ${data.earnings}</p>


}

function logout(){
localStorage.removeItem("referral_phone")
window.location.href="/referral-login/"
}

loadUser()

</script>

</body>
</html>
